;CustomRules comprehensive rules v2
;用途：基于 origin.ini、blackmatrix7/ios_rule_script、Loyalsoldier/clash-rules 调整的完整预览配置。
;原则：业务分流 + 少量区域解锁池；不启用广告拦截；不恢复大量地区测速分组。
;注意：这是预览版配置，后续确认后再按实际使用结果继续收敛规则和分组。
;内核要求：启用 IP-ASN 规则时建议使用 Mihomo / Meta 内核。

[custom]
;设置规则标志位
;规则按从上到下顺序匹配，越具体的规则越靠前。

